<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collection | The Free Book Nook</title>
    <link rel="icon" type="image/png" href="assets/book-logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav-left" aria-label="Primary navigation">
        <a href="search.html">Search Books</a>
        <a href="index.html#about">About Us</a>
      </nav>

      <a class="brand" href="index.html" aria-label="The Free Book Nook home">
        <img src="assets/book-logo.png" alt="" class="brand-logo" />
        <span>The Free Book Nook</span>
      </a>

      <nav class="nav-right" aria-label="Account navigation">
        <a href="index.html#donate">Donate</a>
        <a
          href="index.html#signin"
          data-modal-open="signin-modal"
          class="login-link"
        >
          Login/Sign up
        </a>
        <div class="user-menu" hidden>
          <button
            class="user-button"
            type="button"
            aria-label="User account menu"
            aria-haspopup="true"
            aria-expanded="false"
          >
            <span class="user-icon" aria-hidden="true"></span>
            <span class="user-name">TheFreeBookNook</span>
          </button>
          <div class="account-dropdown" role="menu">
            <a href="#starred" role="menuitem">Starred</a>
            <a href="collections.html" role="menuitem">Collections</a>
            <a href="#creator-access" role="menuitem">Creator Access</a>
            <a href="contact.html" role="menuitem">Contact Us</a>
            <button class="logout-button" type="button" role="menuitem">
              Sign Out
            </button>
          </div>
        </div>
      </nav>
    </header>

    <main class="collections-page collection-detail-page">
      <section class="collections-hero collection-detail-hero">
        <a class="back-link" href="collections.html">Back to collections</a>
        <h1 data-collection-title title="Double-click to rename">Collection</h1>
        <p class="collection-title-hint">Double-click to rename</p>
      </section>

      <section class="bookshelf-section" aria-labelledby="bookshelf-title">
        <h2 id="bookshelf-title">Saved books</h2>
        <div class="bookshelf" data-bookshelf></div>
      </section>
    </main>

    <div
      class="modal-overlay collection-modal"
      id="collection-modal"
      aria-hidden="true"
      role="dialog"
      aria-modal="true"
      aria-labelledby="collection-modal-title"
    >
      <div class="signin-modal">
        <button
          class="modal-close"
          type="button"
          aria-label="Close collection form"
          data-collection-modal-close
        >
          &times;
        </button>
        <h2 id="collection-modal-title">Rename collection</h2>
        <form class="signin-form collection-form">
          <label for="collection-name">Collection name</label>
          <input
            id="collection-name"
            name="collectionName"
            type="text"
            autocomplete="off"
            required
          />
          <p
            class="signin-message collection-message"
            role="status"
            aria-live="polite"
          ></p>
          <button type="submit">Save name</button>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
