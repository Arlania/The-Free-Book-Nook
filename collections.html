<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collections | The Free Book Nook</title>
    <link rel="icon" type="image/png" href="assets/book-logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav-left" aria-label="Primary navigation">
        <a href="search.html">Search Books</a>
        <a href="index.html#about">About Us</a>
      </nav>

      <a class="brand" href="index.html" aria-label="The Free Book Nook home">
        <img src="assets/book-logo.png" alt="" class="brand-logo" />
        <span>The Free Book Nook</span>
      </a>

      <nav class="nav-right" aria-label="Account navigation">
        <a href="index.html#donate">Donate</a>
        <a
          href="index.html#signin"
          data-modal-open="signin-modal"
          class="login-link"
        >
          Login/Sign up
        </a>
        <div class="user-menu" hidden>
          <button
            class="user-button"
            type="button"
            aria-label="User account menu"
            aria-haspopup="true"
            aria-expanded="false"
          >
            <span class="user-icon" aria-hidden="true"></span>
            <span class="user-name">TheFreeBookNook</span>
          </button>
          <div class="account-dropdown" role="menu">
            <a href="#starred" role="menuitem">Starred</a>
            <a href="collections.html" role="menuitem">Collections</a>
            <a href="#creator-access" role="menuitem">Creator Access</a>
            <a href="contact.html" role="menuitem">Contact Us</a>
            <button class="logout-button" type="button" role="menuitem">
              Sign Out
            </button>
          </div>
        </div>
      </nav>
    </header>

    <main class="collections-page">
      <section class="collections-hero" aria-labelledby="collections-title">
        <h1 id="collections-title">
          <span class="page-user-name">TheFreeBookNook</span>
        </h1>
      </section>

      <section class="collections-content" aria-labelledby="my-collections">
        <h2 id="my-collections">My collections</h2>

        <div class="collections-grid" data-collections-grid>
          <button class="create-collection-card" type="button">
            <span>Create new</span>
            <strong aria-hidden="true">+</strong>
          </button>
        </div>
      </section>
    </main>

    <div
      class="modal-overlay collection-modal"
      id="collection-modal"
      aria-hidden="true"
      role="dialog"
      aria-modal="true"
      aria-labelledby="collection-modal-title"
    >
      <div class="signin-modal">
        <button
          class="modal-close"
          type="button"
          aria-label="Close collection form"
          data-collection-modal-close
        >
          &times;
        </button>
        <h2 id="collection-modal-title">Create collection</h2>
        <form class="signin-form collection-form">
          <label for="collection-name">Collection name</label>
          <input
            id="collection-name"
            name="collectionName"
            type="text"
            autocomplete="off"
            placeholder="My favorite books"
            required
          />
          <p class="signin-message collection-message" role="status" aria-live="polite"></p>
          <button type="submit">Create collection</button>
        </form>
      </div>
    </div>

    <div
      class="modal-overlay delete-collection-modal"
      id="delete-collection-modal"
      aria-hidden="true"
      role="dialog"
      aria-modal="true"
      aria-labelledby="delete-collection-title"
    >
      <div class="signin-modal">
        <button
          class="modal-close"
          type="button"
          aria-label="Close delete collection warning"
          data-delete-collection-close
        >
          &times;
        </button>
        <h2 id="delete-collection-title">Delete collection?</h2>
        <p class="delete-collection-warning"></p>
        <div class="delete-collection-actions">
          <button type="button" data-delete-collection-cancel>Cancel</button>
          <button class="confirm-delete-collection" type="button">
            Delete collection
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
