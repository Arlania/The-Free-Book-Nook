<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | The Free Book Nook</title>
    <link rel="icon" type="image/png" href="assets/book-logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav-left" aria-label="Primary navigation">
        <a href="search.html">Search Books</a>
        <a href="index.html#about">About Us</a>
      </nav>

      <a class="brand" href="index.html" aria-label="The Free Book Nook home">
        <img src="assets/book-logo.png" alt="" class="brand-logo" />
        <span>The Free Book Nook</span>
      </a>

      <nav class="nav-right" aria-label="Account navigation">
        <a href="index.html#donate">Donate</a>
        <a href="#signin" data-modal-open="signin-modal" class="login-link">
          Login/Sign up
        </a>
        <div class="user-menu" hidden>
          <button
            class="user-button"
            type="button"
            aria-label="User account menu"
            aria-haspopup="true"
            aria-expanded="false"
          >
            <span class="user-icon" aria-hidden="true"></span>
            <span class="user-name">TheFreeBookNook</span>
          </button>
          <div class="account-dropdown" role="menu">
            <a href="#starred" role="menuitem">Starred</a>
            <a href="collections.html" role="menuitem">Collections</a>
            <a href="#creator-access" role="menuitem">Creator Access</a>
            <a href="contact.html" role="menuitem" aria-current="page">
              Contact Us
            </a>
            <button class="logout-button" type="button" role="menuitem">
              Sign Out
            </button>
          </div>
        </div>
      </nav>
    </header>

    <main class="contact-page">
      <section class="contact-intro" aria-labelledby="contact-title">
        <p class="contact-eyebrow">We’re here to help</p>
        <h1 id="contact-title">Contact Us</h1>
        <p>Send us a message and tell us how we can help.</p>
      </section>

      <section class="contact-card" aria-label="Contact form">
        <form class="contact-form">
          <div class="contact-field-row">
            <div class="contact-field">
              <label for="contact-name">Name</label>
              <input id="contact-name" name="name" type="text"
                autocomplete="name" placeholder="Your name" required />
            </div>
            <div class="contact-field">
              <label for="contact-email">Email</label>
              <input id="contact-email" name="email" type="email"
                autocomplete="email" placeholder="you@example.com" required />
            </div>
          </div>

          <div class="contact-field">
            <label for="contact-message">Message</label>
            <textarea id="contact-message" name="message" rows="7"
              maxlength="1200" placeholder="Tell us what’s on your mind..."
              required></textarea>
            <p class="contact-field-hint">Up to 1,200 characters.</p>
          </div>

          <p class="contact-form-message" role="status" aria-live="polite"></p>
          <button type="submit">Send message</button>
        </form>
      </section>
    </main>

    <div class="modal-overlay" id="signin-modal" aria-hidden="true"
      role="dialog" aria-modal="true" aria-labelledby="signin-title">
      <div class="signin-modal">
        <button class="modal-close" type="button" aria-label="Close sign in">
          &times;
        </button>
        <h2 id="signin-title">Login</h2>
        <form class="signin-form">
          <label for="signin-email">Email</label>
          <input id="signin-email" name="email" type="text"
            autocomplete="username" placeholder="TheFreeBookNook" required />
          <label for="signin-password">Password</label>
          <input id="signin-password" name="password" type="password"
            autocomplete="current-password" placeholder="TheFreeBookNook"
            required />
          <p class="signup-prompt">
            New to The Free Book Nook?
            <a href="signup.html">Create an account</a>
          </p>
          <label class="terms-check" for="signin-terms">
            <input id="signin-terms" name="terms" type="checkbox" required />
            <span>I agree to the Terms of Service.</span>
          </label>
          <p class="signin-message" role="status" aria-live="polite"></p>
          <button type="submit">Login</button>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
