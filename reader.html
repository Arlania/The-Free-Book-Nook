<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Read | The Free Book Nook</title>
    <link rel="icon" type="image/png" href="assets/book-logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="reader-body">
    <main class="reader-page">
      <header class="reader-toolbar">
        <a
          class="reader-brand"
          href="search.html"
          aria-label="Return to book search"
        >
          <img src="assets/book-logo.png" alt="" />
          <span class="reader-brand-name">The Free Book Nook</span>
        </a>

        <div class="reader-book-info">
          <h1 id="reader-title">Loading book...</h1>
          <p class="reader-author"></p>
        </div>

        <nav class="reader-controls" aria-label="Page controls">
          <button class="reader-page-button reader-previous" type="button">
            Previous
          </button>
          <label class="reader-page-number">
            <span class="sr-only">Current page</span>
            <input type="number" min="1" value="1" inputmode="numeric" />
            <span>of <span class="reader-page-total">—</span></span>
          </label>
          <button class="reader-page-button reader-next" type="button">
            Next
          </button>
        </nav>
      </header>

      <section class="reader-stage" aria-label="Book page">
        <p class="reader-message" role="status" aria-live="polite">
          Loading book...
        </p>
        <canvas class="reader-canvas" hidden></canvas>
      </section>
    </main>

    <script type="module" src="reader.js"></script>
  </body>
</html>
