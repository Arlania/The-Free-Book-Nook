<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Books | The Free Book Nook</title>
    <link rel="icon" type="image/png" href="assets/book-logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav-left" aria-label="Primary navigation">
        <a href="search.html">Search Books</a>
        <a href="index.html#about">About Us</a>
      </nav>

      <a class="brand" href="index.html" aria-label="The Free Book Nook home">
        <img src="assets/book-logo.png" alt="" class="brand-logo" />
        <span>The Free Book Nook</span>
      </a>

      <nav class="nav-right" aria-label="Account navigation">
        <a href="index.html#donate">Donate</a>
        <a href="index.html#signin">Login/Sign up</a>
      </nav>
    </header>

    <main class="search-page">
      <section class="search-card" aria-labelledby="search-title">
        <h1 id="search-title">Search</h1>
        <p>
          Look for novels, manga, cookbooks, academic papers, and other digital
          books
        </p>

        <form class="book-search-form">
          <label for="book-search">Book title, author, ISBN, or DOI</label>
          <div class="search-row">
            <input
              id="book-search"
              name="query"
              type="search"
              placeholder="Search..."
              required
            />
            <button type="submit">Search</button>
          </div>

        </form>

        <section
          class="search-results"
          aria-labelledby="search-results-title"
          aria-live="polite"
          hidden
        >
          <div class="search-results-banner">
            <p class="search-results-count"></p>
            <h2 id="search-results-title">Search Results</h2>
          </div>

          <div class="search-result-tabs" role="group" aria-label="Search within">
            <button
              class="search-result-tab is-active"
              type="button"
              data-search-scope="all"
              aria-pressed="true"
            >
              All
            </button>
            <button
              class="search-result-tab"
              type="button"
              data-search-scope="title"
              aria-pressed="false"
            >
              Title
            </button>
            <button
              class="search-result-tab"
              type="button"
              data-search-scope="author"
              aria-pressed="false"
            >
              Author
            </button>
          </div>

          <p class="search-status"></p>
          <div class="search-results-grid"></div>
        </section>

        <div class="recent-searches" aria-labelledby="recent-searches-title">
          <h2 id="recent-searches-title">Recent Searches</h2>
          <div class="recent-search-list"></div>
          <p class="recent-searches-empty">No recent searches yet.</p>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
