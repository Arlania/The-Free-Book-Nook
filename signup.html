<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | The Free Book Nook</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav-left" aria-label="Primary navigation">
        <a href="index.html#search">Search Books</a>
        <a href="index.html#about">About Us</a>
      </nav>

      <a class="brand" href="index.html" aria-label="The Free Book Nook home">
        <img src="assets/book-logo.png" alt="" class="brand-logo" />
        <span>The Free Book Nook</span>
      </a>

      <nav class="nav-right" aria-label="Account navigation">
        <a href="index.html#donate">Donate</a>
        <a href="index.html#signin">Login</a>
      </nav>
    </header>

    <main class="auth-page">
      <section class="auth-card" aria-labelledby="signup-title">
        <h1 id="signup-title">Create your account</h1>
        <p>
          Join The Free Book Nook to request books, build collections, and help
          support creators.
        </p>

        <form class="signin-form signup-form">
          <label for="signup-name">Name</label>
          <input
            id="signup-name"
            name="name"
            type="text"
            autocomplete="name"
            placeholder="Your name"
            required
          />

          <label for="signup-email">Email</label>
          <input
            id="signup-email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />

          <label for="signup-password">Password</label>
          <input
            id="signup-password"
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="Create a password"
            required
          />

          <label class="terms-check" for="signup-terms">
            <input id="signup-terms" name="terms" type="checkbox" required />
            <span>I agree to the Terms of Service.</span>
          </label>

          <button type="submit">Create Account</button>
        </form>
      </section>
    </main>
  </body>
</html>
